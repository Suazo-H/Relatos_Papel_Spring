server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # =====================================================
        # CATALOGUE MICROSERVICE ROUTES
        # =====================================================
        
        # GET all books or search with filters
        - id: catalogue-get-books
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/books
            - Method=GET
          filters:
            - RewritePath=/api/v1/books, /api/v1/books
        
        # GET single book by ID
        - id: catalogue-get-book
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/books/{bookId}
            - Method=GET
          filters:
            - RewritePath=/api/v1/books/(?<bookId>.*), /api/v1/books/${bookId}
        
        # POST create book (direct)
        - id: catalogue-create-book
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/books
            - Method=POST
          filters:
            - RewritePath=/api/v1/books, /api/v1/books
        
        # PUT update book (direct)
        - id: catalogue-update-book
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/books/{bookId}
            - Method=PUT
          filters:
            - RewritePath=/api/v1/books/(?<bookId>.*), /api/v1/books/${bookId}
        
        # PATCH partial update book (direct)
        - id: catalogue-patch-book
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/books/{bookId}
            - Method=PATCH
          filters:
            - RewritePath=/api/v1/books/(?<bookId>.*), /api/v1/books/${bookId}
        
        # DELETE book (direct)
        - id: catalogue-delete-book
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/books/{bookId}
            - Method=DELETE
          filters:
            - RewritePath=/api/v1/books/(?<bookId>.*), /api/v1/books/${bookId}
        
        # =====================================================
        # POST TRANSCRIPTION ROUTES (for maximum points)
        # Frontend sends POST, Gateway transcribes to actual method
        # =====================================================
        
        # POST -> GET (search books via POST body)
        - id: catalogue-post-to-get-books
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/catalogue/search
            - Method=POST
          filters:
            - SetRequestHeader=X-HTTP-Method-Override, GET
            - RewritePath=/api/v1/catalogue/search, /api/v1/books
            - SetRequestHeader=X-Transcribed-From, POST
        
        # POST -> PUT (update book via POST with _method=PUT)
        - id: catalogue-post-to-put
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/catalogue/books/{bookId}/update
            - Method=POST
          filters:
            - RewritePath=/api/v1/catalogue/books/(?<bookId>.*)/update, /api/v1/books/${bookId}
            - SetRequestHeader=X-HTTP-Method-Override, PUT
        
        # POST -> PATCH (partial update via POST with _method=PATCH)
        - id: catalogue-post-to-patch
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/catalogue/books/{bookId}/patch
            - Method=POST
          filters:
            - RewritePath=/api/v1/catalogue/books/(?<bookId>.*)/patch, /api/v1/books/${bookId}
            - SetRequestHeader=X-HTTP-Method-Override, PATCH
        
        # POST -> DELETE (delete book via POST with _method=DELETE)
        - id: catalogue-post-to-delete
          uri: lb://catalogue
          predicates:
            - Path=/api/v1/catalogue/books/{bookId}/delete
            - Method=POST
          filters:
            - RewritePath=/api/v1/catalogue/books/(?<bookId>.*)/delete, /api/v1/books/${bookId}
            - SetRequestHeader=X-HTTP-Method-Override, DELETE
        
        # =====================================================
        # ORDERS MICROSERVICE ROUTES
        # =====================================================
        
        # POST create order
        - id: orders-create
          uri: lb://orders
          predicates:
            - Path=/api/v1/orders
            - Method=POST
          filters:
            - RewritePath=/api/v1/orders, /api/v1/orders
        
        # GET orders by user
        - id: orders-get-by-user
          uri: lb://orders
          predicates:
            - Path=/api/v1/orders/user/{userId}
            - Method=GET
          filters:
            - RewritePath=/api/v1/orders/user/(?<userId>.*), /api/v1/orders/user/${userId}
        
        # GET single order
        - id: orders-get-order
          uri: lb://orders
          predicates:
            - Path=/api/v1/orders/{orderId}
            - Method=GET
          filters:
            - RewritePath=/api/v1/orders/(?<orderId>.*), /api/v1/orders/${orderId}

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Actuator for route inspection
management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
